<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMetrics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           CYBER-TECH THEME (CSS3 Variables & Setup)
           ========================================= */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f0ff;
            --neon-pink: #ff003c;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --glass-blur:blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, var(--bg-color));
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
        }

        /* Typography & Neons */
        h1, h2, h3 { font-weight: 700; }
        
        .neon-text-cyan {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .neon-text-pink {
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        /* Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* Analytics Section */
        .analytics-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            text-align: center;
            padding: 1.5rem;
            border-top: 2px solid var(--neon-cyan);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Forms & Inputs */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }
        select{
            background-color: rgba(0, 0, 0, 0.2); /* Forces background to Black */
            color: white;/* Makes text White */
            cursor: pointer;
        }
        /* This makes the options inside the list black too */
        select option{
            background-color: #000000;
            color: white;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        button.btn-danger {
            color: var(--neon-pink);
            border-color: var(--neon-pink);
        }

        button.btn-danger:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
        }

        /* Movie Grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            position: relative;
            display: flex;
            flex-direction: column;
            border-left: 3px solid var(--neon-pink);
            transition: transform 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-5px);
        }

        .movie-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .movie-title { font-size: 1.2rem; margin-bottom: 0.3rem; }
        .movie-genre { font-size: 0.8rem; color: var(--neon-cyan); background: rgba(0, 240, 255, 0.1); padding: 0.2rem 0.6rem; border-radius: 12px; display: inline-block;}
        
        .movie-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .rating-badge {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fbbf24;
        }

        .movie-review {
            font-size: 0.9rem;
            line-height: 1.5;
            flex-grow: 1;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: rgba(226, 232, 240, 0.8);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .card-actions button { padding: 0.5rem; font-size: 0.8rem; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }
        .modal-content { width: 400px; max-width: 90%; }
        
        #toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 1rem 2rem; border-radius: 8px;
            background: var(--neon-cyan); color: var(--bg-color);
            font-weight: bold; transform: translateX(150%);
            transition: transform 0.3s ease; z-index: 2000;
        }
        #toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="neon-text-cyan">CineMetrics<span style="color:var(--text-main); font-weight:300;"></span></h1>
        <div id="connection-status" style="font-size: 15px; color: #39FF14; border: 3px solid #3bb74a; padding: 0.3rem 0.8rem; border-radius: 20px;">
         ● System Online
        <!--<div id="connection-status" style="font-size: 0.8rem; color: #fbbf24; border: 1px solid #fbbf24; padding: 0.3rem 0.8rem; border-radius: 20px;">
            Detecting Backend...-->
        </div>
    </header>

    <!-- Analytics Section -->
    <div class="analytics-container glass-panel">
        <div class="stat-card">
            <div class="stat-value neon-text-cyan" id="stat-total">0</div>
            <div class="stat-label">Total Movies</div>
        </div>
        <div class="stat-card">
            <div class="stat-value text-yellow" id="stat-avg">0.0</div>
            <div class="stat-label">Avg Rating</div>
        </div>
        <div class="stat-card">
            <div class="stat-value neon-text-pink" id="stat-genre">-</div>
            <div class="stat-label">Top Genre</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- CREATE: Add Movie Form -->
        <aside class="glass-panel" style="align-self: start;">
            <h2 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem;">Initialize Entry</h2>
            <form id="add-movie-form">
                <div class="form-group">
                    <label for="m-title">Title</label>
                    <input type="text" id="m-title" required placeholder="e.g. Blade Runner 2049">
                </div>
                <div class="form-group">
                    <label for="m-genre">Genre</label>
                    <select id="m-genre" required>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Horror">Horror</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Romance">Romance</option>
                        <option value="Crime">Crime</option>
                        <option value="Mystery">Mystery</option>
                        <option value="Adventure">Adventure</option>
                        <option value="Western">Western</option>
                        <option value="War">War</option>
                        <option value="Family">Family</option>
                        <option value="Documentary">Documentary</option>
                        <option value="Musical">Musical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="m-rating">Rating (0-10)</label>
                    <input type="number" id="m-rating" step="0.1" min="0" max="10" required placeholder="8.5">
                </div>
                <div class="form-group">
                    <label for="m-date">Watch Date</label>
                    <input type="date" id="m-date" required>
                </div>
                <div class="form-group">
                    <label for="m-runtime">Runtime (minutes)</label>
                    <input type="number" id="m-runtime" required placeholder="163">
                </div>
                <button type="submit">Deploy to Database</button>
            </form>
        </aside>

        <!-- READ: Movies Grid -->
        <main>
            <div class="movies-grid" id="movies-container">
                <!-- Movie cards injected via JS -->
            </div>
        </main>
    </div>

    <!-- UPDATE: Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="glass-panel modal-content">
            <h2 class="neon-text-pink" style="margin-bottom: 1rem;">Update Parameters</h2>
            <form id="edit-movie-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-rating">New Rating (0-10)</label>
                    <input type="number" id="edit-rating" step="0.1" min="0" max="10" required>
                </div>
                <div class="form-group">
                    <label for="edit-review">Review / Notes</label>
                    <textarea id="edit-review" rows="4" placeholder="Enter your subjective analysis..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="button" onclick="closeModal()" style="border-color: var(--text-muted); color: var(--text-muted);">Cancel</button>
                    <button type="submit">Commit Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Operation Successful</div>

    <script>
        /* =====================================================================
           FRONTEND LOGIC (Vanilla JS & Fetch)
           Includes an automatic mock-fallback so the UI works perfectly in preview.
           ===================================================================== */
        const API_BASE_URL = 'https://cinemetrics-api-2z7h.onrender.com/api';
        let usingMockData = false;
        // Mock data to ensure the UI works if the Express server isn't running yet
        let mockDB = [
            { id: 1, title: 'Blade Runner 2049', genre: 'Sci-Fi', rating: 9.5, watch_date: '2023-10-15', runtime: 163, review: 'Visual masterpiece. The cyber-punk aesthetics are unmatched.' },
            { id: 2, title: 'The Matrix', genre: 'Sci-Fi', rating: 9.0, watch_date: '2023-11-01', runtime: 136, review: 'Pioneering.' },
            { id: 3, title: 'Dune: Part Two', genre: 'Sci-Fi', rating: 9.8, watch_date: '2024-03-01', runtime: 166, review: 'Absolute cinema.' }
        ];
        // --- Core Fetch Wrapper handling the Real vs Mock state ---
        async function apiRequest(endpoint, options = {}) {
            if (usingMockData) return handleMockRequest(endpoint, options);

            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...options.headers }
                });
                if (!response.ok) throw new Error('Network response was not ok');
                return await response.json();
            } catch (error) {
                console.warn('Backend not accessible. Switching to Mock DB for UI preview.');
                usingMockData = true;
                document.getElementById('connection-status').innerText = 'Mock DB Mode (Backend Offline)';
                document.getElementById('connection-status').style.color = '#ff003c';
                document.getElementById('connection-status').style.borderColor = '#ff003c';
                return handleMockRequest(endpoint, options);
            }
        }

        // --- Data Fetching (READ & Analytics) ---
        async function loadDashboard() {
            // Fetch Analytics
            const analytics = await apiRequest('/analytics');
            document.getElementById('stat-total').innerText = analytics.totalMovies;
            document.getElementById('stat-avg').innerText = analytics.averageRating;
            document.getElementById('stat-genre').innerText = analytics.favoriteGenre;

            // Fetch Movies
            const movies = await apiRequest('/movies');
            renderMovies(movies);
        }

        // --- Render UI ---
        function renderMovies(movies) {
            const container = document.getElementById('movies-container');
            container.innerHTML = '';
            
            movies.forEach(movie => {
                const date = new Date(movie.watch_date).toLocaleDateString();
                const reviewText = movie.review ? `"${movie.review}"` : 'No review data logged.';
                
                const card = document.createElement('div');
                card.className = 'glass-panel movie-card';
                card.innerHTML = `
                    <div class="movie-header">
                        <div>
                            <h3 class="movie-title">${movie.title}</h3>
                            <span class="movie-genre">${movie.genre}</span>
                        </div>
                        <div class="rating-badge">${parseFloat(movie.rating).toFixed(1)}</div>
                    </div>
                    <div class="movie-meta">
                        <span>📅 ${date}</span>
                        <span>⏱️ ${movie.runtime}m</span>
                    </div>
                    <div class="movie-review">${reviewText}</div>
                    <div class="card-actions">
                        <button onclick="openEditModal(${movie.id}, ${movie.rating}, '${(movie.review || '').replace(/'/g, "\\'")}')">Edit</button>
                        <button class="btn-danger" onclick="deleteMovie(${movie.id})">Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- CREATE ---
        document.getElementById('add-movie-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('m-title').value,
                genre: document.getElementById('m-genre').value,
                rating: parseFloat(document.getElementById('m-rating').value),
                watch_date: document.getElementById('m-date').value,
                runtime: parseInt(document.getElementById('m-runtime').value)
            };

            await apiRequest('/movies', { method: 'POST', body: JSON.stringify(payload) });
            showToast('Movie Successfully Added');
            e.target.reset();
            loadDashboard();
        });

        // --- UPDATE ---
        function openEditModal(id, currentRating, currentReview) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-rating').value = currentRating;
            document.getElementById('edit-review').value = currentReview !== 'undefined' ? currentReview : '';
            document.getElementById('edit-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        document.getElementById('edit-movie-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const payload = {
                rating: parseFloat(document.getElementById('edit-rating').value),
                review: document.getElementById('edit-review').value
            };

            await apiRequest(`/movies/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
            showToast('Parameters Updated');
            closeModal();
            loadDashboard();
        });

        // --- DELETE ---
        async function deleteMovie(id) {
            if(confirm('Are you sure you want to permanently delete this record?')) {
                await apiRequest(`/movies/${id}`, { method: 'DELETE' });
                showToast('Record Deleted');
                loadDashboard();
            }
        }

        // --- Utility ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Initialize App on load
        document.addEventListener('DOMContentLoaded', loadDashboard);

        /* =====================================================================
           MOCK BACKEND LOGIC (Ensures Canvas Preview functions independently)
           ===================================================================== */
        function handleMockRequest(endpoint, options) {
            return new Promise((resolve) => {
                setTimeout(() => { // Simulate network delay
                    const method = options.method || 'GET';
                    
                    if (endpoint === '/movies' && method === 'GET') {
                        resolve([...mockDB].sort((a,b) => new Date(b.watch_date) - new Date(a.watch_date)));
                    } 
                    else if (endpoint === '/analytics' && method === 'GET') {
                        const total = mockDB.length;
                        const avg = total > 0 ? (mockDB.reduce((acc, m) => acc + m.rating, 0) / total).toFixed(1) : 0;
                        const genres = {};
                        mockDB.forEach(m => { genres[m.genre] = (genres[m.genre] || 0) + 1; });
                        const topGenre = Object.keys(genres).sort((a,b) => genres[b] - genres[a])[0] || 'N/A';
                        resolve({ totalMovies: total, averageRating: avg, favoriteGenre: topGenre });
                    }
                    else if (endpoint === '/movies' && method === 'POST') {
                        const body = JSON.parse(options.body);
                        const newId = mockDB.length > 0 ? Math.max(...mockDB.map(m => m.id)) + 1 : 1;
                        mockDB.push({ id: newId, ...body });
                        resolve({ id: newId, message: 'Added' });
                    }
                    else if (endpoint.startsWith('/movies/') && method === 'PUT') {
                        const id = parseInt(endpoint.split('/').pop());
                        const body = JSON.parse(options.body);
                        const idx = mockDB.findIndex(m => m.id === id);
                        if(idx > -1) {
                            mockDB[idx].rating = body.rating;
                            mockDB[idx].review = body.review;
                        }
                        resolve({ message: 'Updated' });
                    }
                    else if (endpoint.startsWith('/movies/') && method === 'DELETE') {
                        const id = parseInt(endpoint.split('/').pop());
                        mockDB = mockDB.filter(m => m.id !== id);
                        resolve({ message: 'Deleted' });
                    }
                }, 150);
            });
        }
    </script>
</body>
</html>
